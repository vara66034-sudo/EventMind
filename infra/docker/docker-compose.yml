name: teamEventMind2

services:
  db:
    image: postgres:16
    container_name: teamEventMind2-db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - teamEventMind2_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:18
    container_name: teamEventMind2-odoo
    depends_on:
      - db
    ports:
      - "8075:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - teamEventMind2_odoo_data:/var/lib/odoo
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://odoo:odoo@db:5432/postgres
      VK_TOKEN: dfa1c6afdfa1c6afdfa1c6af8fdc9eafb9ddfa1dfa1c6afb619f2ab0e35e5a8b76e6915
      SAVE_TO_DB: "true"
      VK_PARSER_INTERVAL_MINUTES: "5"
    depends_on:
      - db
    container_name: teamEventMind2-backend
    ports:
      - "8099:8099"
    restart: unless-stopped

volumes:
  teamEventMind2_db_data:
  teamEventMind2_odoo_data:

networks:
  default:
    name: teamEventMind2_network
