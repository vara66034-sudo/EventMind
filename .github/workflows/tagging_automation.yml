name: EventMind Autotagging

on:
  schedule:
    - cron: "5 5 * * *"   # Запуск каждый день в 05:05 по UTC
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/ml/autotagger/requirements.txt

      - name: Run tagging script
        env:
          DATABASE_URL_TAG: ${{ secrets.DATABASE_URL_TAG }}
        run: |
            export PYTHONPATH=$PYTHONPATH:$(pwd)
            python backend/ml/autotagger/main.py
