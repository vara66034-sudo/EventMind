name: Run event parsers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"   # каждый день в 05:00 UTC

jobs:
  parse-events:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Убрали scikit-learn и joblib, оставили только самые нужные пакеты
          pip install pandas psycopg2-binary python-dotenv requests gigachat telethon

      - name: Run VK parser
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GIGACHAT_CREDENTIALS: ${{ secrets.GIGACHAT_CREDENTIALS }}
          SAVE_TO_DB: "true"
        run: |
          python backend/app/integrations/parsers/vk_parser.py

      - name: Run Telegram parser
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          GIGACHAT_CREDENTIALS: ${{ secrets.GIGACHAT_CREDENTIALS }}
        run: |
          python backend/app/integrations/parsers/telegram_parser.py

      - name: Upload Telegram events to DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python backend/app/integrations/parsers/db_uploader.py
